<app-base-dialog title="Recortar Imagen">
  <div form class="flex flex-col items-center gap-4">
    <div
      class="cropper-wrapper w-full overflow-hidden rounded-lg border border-gray-200 bg-gray-50"
    >
      @if (isLoading) {
        <div class="loader-overlay">
          <mat-spinner diameter="48"></mat-spinner>
          <span class="mt-2 text-sm text-gray-500">Cargando imagen...</span>
        </div>
      }
      <image-cropper
        [imageFile]="imageFile"
        [maintainAspectRatio]="true"
        [aspectRatio]="1 / 1"
        [canvasRotation]="rotation"
        [transform]="{ scale: zoomFactor }"
        [containWithinAspectRatio]="true"
        [resizeToWidth]="1200"
        [imageQuality]="98"
        format="webp"
        (imageCropped)="imageCropped($event)"
        (imageLoaded)="imageLoaded()"
        (cropperReady)="cropperReady()"
        (loadImageFailed)="loadImageFailed()"
        class="w-full"
        [class.hidden]="isLoading"
      ></image-cropper>
    </div>

    <div
      class="toolbar flex justify-center gap-3 md:gap-6 w-full mt-2 flex-wrap"
    >
      <button
        mat-mini-fab
        color="primary"
        (click)="zoomOut()"
        matTooltip="Alejar"
      >
        <mat-icon>zoom_out</mat-icon>
      </button>
      <button
        mat-mini-fab
        color="primary"
        (click)="zoomIn()"
        matTooltip="Acercar"
      >
        <mat-icon>zoom_in</mat-icon>
      </button>
      <button
        mat-mini-fab
        color="primary"
        (click)="rotateLeft()"
        matTooltip="Girar izquierda"
      >
        <mat-icon>rotate_left</mat-icon>
      </button>
      <button
        mat-mini-fab
        color="primary"
        (click)="rotateRight()"
        matTooltip="Girar derecha"
      >
        <mat-icon>rotate_right</mat-icon>
      </button>
      <button
        mat-stroked-button
        color="accent"
        (click)="resetImage()"
        class="rounded-full"
      >
        <mat-icon>settings_backup_restore</mat-icon>
        Reiniciar
      </button>
    </div>
  </div>

  <div actions class="w-full">
    <section class="flex flex-col-reverse md:flex-row justify-end gap-3 w-full">
      <div class="w-full flex content-between md:w-[50%]">
        <button
          mat-fab
          extended="true"
          color="warn"
          class="!w-full"
          (click)="onCancel()"
        >
          Cancelar
        </button>
      </div>

      <div class="w-full flex content-between md:w-[50%]">
        <button
          mat-fab
          extended
          color="primary"
          type="button"
          class="mt-2 md:mt-0 !w-full"
          (click)="onSave()"
          [disabled]="!croppedImage"
        >
          Finalizar Recorte
        </button>
      </div>
    </section>
  </div>
</app-base-dialog>
