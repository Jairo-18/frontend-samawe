<div class="auth-content-center">
  <article
    class="relative w-[90%] md:w-[80%] lg:w-[70%] xl:w-[60%] h-auto md:h-[600px] lg:h-[600px] xl:h-[600px] 2xl:h-[600px] 3xl:h-[750px] flex content-between justify-center items-center border border-[var(--primary-color)] rounded-2xl mx-auto overflow-hidden shadow-2xl"
  >
    <section
      class="h-full w-full flex flex-col text-center justify-center items-center p-5 gap-1 md:gap-4"
    >
      <div class="flex flex-col gap-0 md:gap-1.5">
        <span class="font-extrabold text-xl">Iniciar Sesión</span>
        <span class="font-medium text-sm md:text-base">
          Ingrese sus datos para acceder a su cuenta
        </span>
      </div>
      <form
        [formGroup]="form"
        class="flex flex-col w-full items-center gap-0 md:gap-1.5"
      >
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Correo electrónico</mat-label>
          <input matInput formControlName="email" />
          <mat-icon matPrefix>email</mat-icon>
          <mat-error *ngIf="form.get('email')?.hasError('required')">
            Correo electrónico requerido
          </mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">
            Correo electrónico inválido
          </mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Contraseña</mat-label>
          <input
            [type]="!showPassword ? 'password' : 'text'"
            matInput
            formControlName="password"
          />
          <mat-icon matPrefix>lock</mat-icon>
          <button
            type="button"
            matSuffix
            mat-icon-button
            (click)="showPassword = !showPassword"
            class="mr-1"
          >
            <fa-icon [icon]="!showPassword ? eyeOpen : eyeClose"></fa-icon>
          </button>
          <mat-error *ngIf="form.get('password')?.hasError('required')">
            Contraseña requerida
          </mat-error>
        </mat-form-field>
        <div class="flex flex-col w-full items-center justify-center gap-2">
          <button
            mat-fab
            extended="true"
            (click)="login()"
            class="!w-full text-white"
          >
            <span class="text-sm md:text-base">Iniciar Sesión</span>
          </button>
          <div>
            <a
              class="cursor-pointer text-[var(--primary-color)] hover:text-[var(--primary-color)] hover-underline-animation font-medium text-sm md:text-base"
              routerLink="/auth/recovery-password"
            >
              ¿Olvidaste tu contraseña?
            </a>
          </div>
          <div
            class="flex w-full content-between items-center justify-center gap-1"
          >
            <span class="font-medium text-sm md:text-base"
              >¿No tienes una cuenta?</span
            >
            <a
              routerLink="/auth/register"
              class="cursor-pointer text-[var(--primary-color)] hover:text-[var(--primary-color)] hover-underline-animation font-medium text-sm md:text-base"
              >Registrate aquí</a
            >
          </div>
        </div>
      </form>
    </section>
    <section class="relative h-full w-full hidden md:flex flex-col bg-gray-100">
      <img
        *ngIf="loginBgUrl"
        [ngSrc]="loginBgUrl"
        priority
        fill
        alt="Login Background"
        class="object-cover"
      />
    </section>
  </article>
</div>
