<article class="flex flex-col">
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    @for (item of infoTypes; track $index) {
    <div class="p-4 rounded-2xl border border-[var(--primary-color)]">
      <section class="w-full flex justify-end">
        <button
          mat-icon-button
          class="bg-[var(--primary-color)] text-white px-4 py-2 rounded-full text-sm font-semibold hover:bg-[var(--secondary-color)] transition-colors duration-300"
        >
          {{ 'organizational.card_types.manage_permissions' | translate }}
        </button>
        <button
          mat-icon-button
          color="warn"
          (click)="
            remove.emit({ type: selectedType, id: item[getIdKey(item)] })
          "
        >
          <mat-icon>delete</mat-icon>
        </button>
      </section>
      <section class="flex flex-col gap-2">
        <div class="text-sm text-gray-500">{{ 'organizational.card_types.code_prefix' | translate }}:</div>
        <div class="text-base font-semibold text-gray-800">
          {{ item.code }}
        </div>
        <p class="text-[var(--text-color)] text-sm mb-6 m-0 leading-relaxed">
          {{ 'organizational.card_types.total' | translate }}:
          <span class="font-bold text-[var(--title-color)]">{{ item['count'] }}</span>
        </p>
        <div class="text-sm text-gray-500 mt-2">{{ 'organizational.card_types.name' | translate }}:</div>
        <div class="text-base font-semibold text-gray-800">
          {{ item.name }}
        </div>
      </section>
    </div>
    }
  </div>
  <mat-paginator
    class="w-full mt-4"
    [length]="paginationParams.total"
    [pageSize]="paginationParams.perPage"
    [pageSizeOptions]="[5, 10, 25, 100]"
    [pageIndex]="(paginationParams.page || 1) - 1"
    (page)="page.emit($event)"
  ></mat-paginator>
</article>
