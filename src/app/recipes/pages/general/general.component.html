<app-base-page>
  <mat-tab-group
    animationDuration="600ms"
    (selectedIndexChange)="onTabChange($event)"
  >
    <mat-tab [label]="'recipe.tabs.see_recipes' | translate">
      <ng-template matTabContent>
        <app-see-recipes
          (editRecipe)="onEditRecipe($event)"
          (recipesLoaded)="onRecipesLoaded($event)"
        ></app-see-recipes>
      </ng-template>
    </mat-tab>

    @if (!isMesero) {
      <mat-tab
        [label]="currentRecipe ? ('recipe.tabs.edit_recipe' | translate) : ('recipe.tabs.create_recipe' | translate)"
        class="overflow-hidden"
      >
        <ng-template matTabContent
          ><app-create-or-edit-recipe
            [currentRecipe]="currentRecipe"
            [allRecipes]="allRecipes"
            (recipeSaved)="onRecipeSaved()"
            (recipeCanceled)="onRecipeCanceled()"
          ></app-create-or-edit-recipe
        ></ng-template>
      </mat-tab>
    }
  </mat-tab-group>
</app-base-page>
