<nav
  aria-label="Navegación principal"
  class="fixed top-0 left-0 w-full z-[100] transition-all duration-300 ease-in-out py-2"
  [ngClass]="{
    'bg-white': !isScrolled || isPastHero || !isHomePage,
    'shadow-lg': isScrolled,
    'md:bg-transparent md:shadow-none md:backdrop-blur-sm':
      isScrolled && !isPastHero && isHomePage
  }"
>
  <article class="flex px-6 items-center w-full">
    <!-- Branding -->
    <section
      class="flex flex-1 items-center gap-x-3 transition-colors duration-300"
    >
      <img
        routerLink="/"
        [src]="logoUrl"
        [alt]="organizationalName"
        class="h-14 w-14 md:h-[70px] md:w-[70px] cursor-pointer transition-all duration-300"
      />
      <span
        class="hidden lg:block text-base 2xl:text-base 3xl:text-lg font-semibold uppercase transition-colors duration-300"
        [ngClass]="
          isScrolled && !isPastHero && isHomePage
            ? 'text-white'
            : 'text-gray-800'
        "
      >
        {{ organizationalName }}
      </span>
    </section>

    <!-- Links de navegación -->
    <section
      class="hidden md:flex flex-none items-center justify-center gap-x-1 lg:gap-x-1 2xl:gap-x-1 3xl:gap-x-4 transition-colors duration-300"
      [ngClass]="
        isScrolled && !isPastHero && isHomePage ? 'text-white' : 'text-gray-800'
      "
    >
      @for (item of navBarItems; track $index) {
        <a
          [routerLink]="item.route"
          routerLinkActive="!text-[var(--primary-color)]"
          [routerLinkActiveOptions]="
            item.route === '/home' ? exactOptionsStrict : exactOptions
          "
          class="cursor-pointer hover-underline-animation font-medium text-sm lg:text-base px-1 lg:px-1 3xl:px-2 py-1 transition-colors duration-200 whitespace-nowrap flex items-center gap-2"
        >
          <mat-icon class="scale-90" *ngIf="item.icon">{{
            item.icon
          }}</mat-icon>
          <span class="font-medium text-sm">{{ item.title }}</span>
        </a>
      }
    </section>

    <!-- Acciones: login / usuario + hamburguesa -->
    <section class="flex flex-1 items-center justify-end gap-x-3">
      <!-- Desktop: login o menú usuario -->
      <div class="hidden md:flex">
        @if (!isLoggedUser) {
          @if (loginItem) {
            <app-button-landing
              [label]="loginItem.title ?? ''"
              [icon]="loginItem.icon ?? ''"
              variant="transparent"
              [routerLink]="loginItem.route"
            />
          }
        } @else {
          <button
            [matMenuTriggerFor]="userMenu"
            class="flex items-center justify-center gap-2 px-4 py-2 rounded-full transition-all duration-200 border-2 border-[var(--primary-color)] text-[var(--primary-color)] hover:bg-green-50"
          >
            <mat-icon>account_circle</mat-icon>
            <span class="font-bold">{{ userInfo?.firstName }}</span>
            <mat-icon class="scale-75">keyboard_arrow_down</mat-icon>
          </button>

          <mat-menu #userMenu="matMenu" xPosition="before">
            <ng-container *ngFor="let item of loggedMenuItems">
              <ng-container
                *ngIf="
                  item.children && item.children.length > 0;
                  else regularItem
                "
              >
                <button mat-menu-item [matMenuTriggerFor]="subMenu">
                  <mat-icon class="text-[var(--primary-color)]">{{
                    item.icon
                  }}</mat-icon>
                  <span>{{ item.title }}</span>
                </button>
                <mat-menu #subMenu="matMenu">
                  <button
                    mat-menu-item
                    *ngFor="let child of item.children"
                    [routerLink]="child.route"
                  >
                    <mat-icon class="text-[var(--primary-color)]">{{
                      child.icon
                    }}</mat-icon>
                    <span>{{ child.title }}</span>
                  </button>
                </mat-menu>
              </ng-container>
              <ng-template #regularItem>
                <button mat-menu-item [routerLink]="item.route">
                  <mat-icon class="text-[var(--primary-color)]">{{
                    item.icon
                  }}</mat-icon>
                  <span>{{ item.title }}</span>
                </button>
              </ng-template>
            </ng-container>
            <mat-divider />
            <button
              mat-menu-item
              (click)="logoutEvent.emit()"
              class="text-red-600"
            >
              <mat-icon class="text-red-600">logout</mat-icon>
              <span class="font-bold">Cerrar Sesión</span>
            </button>
          </mat-menu>
        }
      </div>

      <!-- Mobile: hamburguesa -->
      <button
        class="flex md:hidden p-1 transition-colors"
        aria-label="Abrir menú"
        (click)="openMenu.emit()"
      >
        <mat-icon>menu</mat-icon>
      </button>
    </section>
  </article>
</nav>
