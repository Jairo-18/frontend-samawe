@if (showNotificationsIcon) {
  <div
    class="h-full w-full flex items-center"
    (click)="$event.stopPropagation()"
  >
    <button
      mat-icon-button
      (click)="toggleMenu($event)"
      class="!bg-white shadow border border-gray-300 relative"
      matBadge="{{ unreadNotifications }}"
      [matBadgeHidden]="unreadNotifications === 0"
      matBadgeColor="warn"
      matBadgePosition="above after"
    >
      <mat-icon class="text-[var(--primary-color)]"> notifications </mat-icon>
    </button>

    @if (isMenuOpen) {
      <article
        class="fixed top-[70px] right-2 md:right-6 z-[1050] bg-[#F0F4F9]/95 backdrop-blur-sm rounded-lg shadow-2xl border-[0.5px] border-[var(--primary-color)] overflow-hidden"
        style="
          width: 900px;
          max-width: 95vw;
          max-height: 60vh;
          display: flex;
          flex-direction: column;
          z-index: 1000;
        "
        (click)="$event.stopPropagation()"
      >
        <div class="h-full w-full flex flex-col">
          <div
            class="w-full px-4 py-3 border-b border-[var(--primary-color)] font-bold flex flex-col gap-2 bg-white/50"
          >
            <div class="w-full flex flex-col">
              <span class="text-lg md:text-xl text-gray-800"
                >Notificaciones</span
              >
              @if (unreadNotifications > 0) {
                <span class="text-xs font-normal text-gray-600"
                  >{{ unreadNotifications }} notificaciones sin leer</span
                >
              }
            </div>
            <div class="w-full flex gap-2">
              <button
                mat-stroked-button
                color="primary"
                class="!text-[10px] md:!text-[12px] !h-8 md:!h-10 !px-2 flex items-center gap-1 w-full"
                (click)="markAllRead()"
              >
                <mat-icon class="!text-sm !w-4 !h-4">done_all</mat-icon> Leer
                todo
              </button>
              <button
                mat-stroked-button
                class="!text-[10px] md:!text-[12px] !h-8 md:!h-10 !px-2 flex items-center gap-1 !text-gray-600 w-full"
                (click)="markAllUnread()"
              >
                <mat-icon class="!text-sm !w-4 !h-4">mark_as_unread</mat-icon>
                No leído
              </button>
              <button
                mat-stroked-button
                color="warn"
                class="!text-[10px] md:!text-[12px] !h-8 md:!h-10 !px-2 flex items-center gap-1 w-full"
                (click)="deleteAll()"
              >
                <mat-icon
                  class="!text-xs md:!text-base !w-4 md:!w-6 !h-4 md:!h-6"
                  >delete_sweep</mat-icon
                >
                Limpiar
              </button>
            </div>
          </div>

          <mat-tab-group>
            <mat-tab
              label="Cocina {{ tabStates['ENC'].pagination?.total || 0 }}"
            >
              <ng-template matTabContent>
                <app-notification-tab-content
                  *ngIf="tabStates['ENC']?.data"
                  [list]="tabStates['ENC'].data"
                  [stateCode]="'ENC'"
                  [loading]="tabStates['ENC'].loading"
                  (scrollContent)="onScroll($event.event, $event.stateCode)"
                  (itemClick)="goToOrder($event)"
                  (toggleRead)="toggleRead($event.event, $event.notif)"
                  (delete)="deleteNotification($event.event, $event.notif)"
                ></app-notification-tab-content>
              </ng-template>
            </mat-tab>
            <mat-tab
              label="Entregado {{ tabStates['ENT'].pagination?.total || 0 }}"
            >
              <ng-template matTabContent>
                <app-notification-tab-content
                  *ngIf="tabStates['ENT']?.data"
                  [list]="tabStates['ENT'].data"
                  [stateCode]="'ENT'"
                  [loading]="tabStates['ENT'].loading"
                  (scrollContent)="onScroll($event.event, $event.stateCode)"
                  (itemClick)="goToOrder($event)"
                  (toggleRead)="toggleRead($event.event, $event.notif)"
                  (delete)="deleteNotification($event.event, $event.notif)"
                ></app-notification-tab-content>
              </ng-template>
            </mat-tab>
          </mat-tab-group>
        </div>
      </article>
    }
  </div>
}
