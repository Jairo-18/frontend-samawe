<nav
  class="fixed bottom-0 left-0 w-full h-[75px] bg-white/90 backdrop-blur-md rounded-t-[24px] shadow-[0_-4px_20px_rgba(0,0,0,0.08)] z-[1000] pb-[env(safe-area-inset-bottom)]"
>
  <div class="h-full max-w-[500px] mx-auto px-[10px]">
    <div class="grid grid-cols-5 h-full items-center">
      @for (item of menuItems; track $index) {
        @if (item) {
          @if (item.name === 'Inicio') {
            <!-- Center floating item -->
            <div
              class="flex flex-col items-center justify-center relative h-full"
            >
              <a
                [routerLink]="item.route"
                routerLinkActive="shadow-[0_6px_16_rgba(6,166,6,0.4)]"
                class="w-14 h-14 bg-gradient-to-br from-[var(--primary-color)] to-[var(--primary-color)] rounded-full flex items-center justify-center text-white no-underline shadow-[0_4px_12px_rgba(6,166,6,0.3)] absolute top-[-24px] transition-all duration-300 border-4 border-white active:scale-90"
              >
                <mat-icon class="!text-[28px] !w-[28px] !h-[28px]">{{
                  item.icon
                }}</mat-icon>
              </a>
              <span
                class="text-[11px] font-semibold text-[var(--primary-color)] mt-8"
                >{{ item.name }}</span
              >
            </div>
          } @else if (item.name === 'Ajustes') {
            <!-- Ajustes with Menu (Far Right) -->
            <button
              [matMenuTriggerFor]="mobileSettingsMenu"
              class="flex flex-col items-center justify-center text-[#797979] text-[11px] font-medium transition-all duration-300 gap-1 group active:scale-95"
            >
              <mat-icon
                class="!text-[26px] !w-[26px] !h-[26px] transition-transform"
                >{{ item.icon }}</mat-icon
              >
              <span>{{ item.name }}</span>
            </button>
          } @else {
            <!-- Other items (next to Inicio) -->
            <a
              [routerLink]="item.route"
              routerLinkActive="!text-[var(--primary-color)]"
              class="flex flex-col items-center justify-center no-underline text-[#797979] text-[11px] font-medium transition-all duration-300 gap-1 group"
            >
              <mat-icon
                class="!text-[26px] !w-[26px] !h-[26px] group-[.active]:-translate-y-[2px] transition-transform"
                >{{ item.icon }}</mat-icon
              >
              <span>{{ item.name }}</span>
            </a>
          }
        } @else {
          <!-- Empty slot to preserve grid -->
          <div class="flex items-center justify-center h-full"></div>
        }
      }
    </div>
  </div>

  <!-- Mobile Settings Menu -->
  <mat-menu #mobileSettingsMenu="matMenu">
    <ng-container *ngFor="let item of loggedMenuItems">
      <ng-container
        *ngIf="item.children && item.children.length > 0; else regularItem"
      >
        <button mat-menu-item [matMenuTriggerFor]="subMenu">
          <mat-icon class="text-[var(--primary-color)]">{{
            item.icon
          }}</mat-icon>
          <span>{{ item.title }}</span>
        </button>
        <mat-menu #subMenu="matMenu">
          <button
            mat-menu-item
            *ngFor="let child of item.children"
            [routerLink]="child.route"
          >
            <mat-icon class="text-[var(--primary-color)]">{{
              child.icon
            }}</mat-icon>
            <span>{{ child.title }}</span>
          </button>
        </mat-menu>
      </ng-container>

      <!-- Regular Item -->
      <ng-template #regularItem>
        <button mat-menu-item [routerLink]="item.route">
          <mat-icon class="text-[var(--primary-color)]">{{
            item.icon
          }}</mat-icon>
          <span>{{ item.title }}</span>
        </button>
      </ng-template>
    </ng-container>
  </mat-menu>
</nav>
