<div class="settings-container p-6 flex flex-col items-center justify-center min-h-[60vh]">
  <h1 class="text-3xl font-bold mb-8 text-[#06a606]">Ajustes</h1>

  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 border border-[#06a606]/10">
    <div class="flex flex-col gap-4">
      <div class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-50 transition-colors cursor-pointer">
        <mat-icon class="text-gray-500">person</mat-icon>
        <span class="text-lg">Mi Perfil</span>
      </div>
      
      <div class="h-[1px] bg-gray-100"></div>

      <button 
        (click)="logout()"
        class="flex items-center gap-3 p-3 rounded-lg hover:bg-red-50 text-red-600 transition-colors w-full text-left"
      >
        <mat-icon>logout</mat-icon>
        <span class="text-lg font-medium">Cerrar Sesión</span>
      </button>
    </div>
  </div>
</div>
