<div
  class="settings-container p-6 flex flex-col items-center justify-center min-h-[60vh]"
>
  <h1 class="text-3xl font-bold mb-8 text-[#06a606]">Ajustes de Perfil</h1>

  <div
    class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 border border-[#06a606]/10"
  >
    <div class="flex flex-col gap-2">
      @for (item of settingsItems; track item.label) {
        <div
          (click)="navigateTo(item.route)"
          class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-50 transition-colors cursor-pointer group"
        >
          <mat-icon
            class="text-gray-500 group-hover:text-[#06a606] transition-colors"
            >{{ item.icon }}</mat-icon
          >
          <span class="text-[16px] font-medium">{{ item.label }}</span>
        </div>
        <div class="h-[1px] bg-gray-50 last:hidden"></div>
      }

      @if (settingsItems.length > 0) {
        <div class="h-[1px] bg-gray-100 my-2"></div>
      }

      <button
        (click)="logout()"
        class="flex items-center gap-3 p-3 rounded-lg hover:bg-red-50 text-red-600 transition-colors w-full text-left group"
      >
        <mat-icon class="group-hover:scale-110 transition-transform"
          >logout</mat-icon
        >
        <span class="text-[16px] font-semibold">Cerrar Sesión</span>
      </button>
    </div>
  </div>
</div>
