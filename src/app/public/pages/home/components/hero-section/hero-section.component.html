<article class="relative w-full h-[60vh] overflow-hidden">
  <img
    src="assets/images/homenew.jpg"
    [alt]="org?.homeTitle ?? 'Samawe'"
    class="absolute inset-0 w-full h-full object-cover z-0"
  />
  <div class="absolute inset-0 bg-black/40 z-0"></div>
  <div
    class="relative z-10 flex flex-col items-center justify-center h-full text-center text-white px-6"
  >
    <p class="text-sm font-semibold uppercase tracking-widest opacity-80 mb-2">
      {{ org?.name ?? '' }}
    </p>
    <h1
      class="text-xl md:text-4xl font-bold drop-shadow-md max-w-5xl leading-tight"
    >
      {{ org?.homeTitle ?? '' }}
    </h1>
    @if (org?.homeDescription) {
      <p class="mt-4 text-sm md:text-lg drop-shadow-md max-w-3xl opacity-90">
        {{ org?.homeDescription }}
      </p>
    }
    <section class="flex flex-wrap justify-center gap-4 mt-8">
      <app-button-landing
        label="Contáctanos"
        icon="phone"
        variant="solid"
        (clicked)="openWhatsapp()"
      />
      @if (!isLoggedUser) {
        <app-button-landing
          label="Iniciar Sesión"
          icon="login"
          variant="transparent"
          (clicked)="goToLogin()"
        />
      }
    </section>
  </div>
</article>
