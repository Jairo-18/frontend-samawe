<article class="brand-content-center relative overflow-x-hidden">
  <img
    ngSrc="assets/images/homenew.jpg"
    fill
    priority
    alt="Selva Putumayo"
    class="absolute inset-0 w-full h-dvh object-cover z-0"
  />
  <div class="absolute inset-0 bg-black/40 z-0"></div>
  <div
    class="relative z-10 w-[90%] md:w-[80%] xl:w-[85%] lg:w-[90%] text-white flex flex-col justify-center items-center text-center h-full pt-20"
  >
    <span
      class="text-xl font-semibold leading-tight md:text-4xl drop-shadow-md"
    >
      {{ org?.homeTitle || '' }}
    </span>
    <p class="mt-3 text-xs md:text-lg drop-shadow-md max-w-2xl">
      {{ org?.homeDescription || '' }}
    </p>
    <section class="flex flex-wrap justify-center gap-4 mt-8">
      <app-button-landing
        label="Contáctanos"
        icon="phone
        "
        variant="solid"
        (clicked)="openWhatsapp()"
      />
      <app-button-landing
        label="Iniciar Sesión"
        icon="login"
        variant="transparent"
        (clicked)="goToLogin()"
      />
    </section>
  </div>
</article>
