<section class="w-full py-16 px-6 md:px-16 bg-white">
  <div
    class="flex flex-col max-w-7xl mx-auto gap-5 items-center justify-center text-center"
  >
    <span
      class="text-xs uppercase tracking-widest text-[var(--primary-color,#5c7a4e)] font-semibold"
    >
      Reservaciones
    </span>
    <h2 class="text-2xl md:text-3xl font-bold text-gray-800 leading-snug">
      {{ org?.reservationTitle }}
    </h2>
    @if (org?.reservationDescription) {
      <p class="text-gray-600 text-sm md:text-base leading-relaxed">
        {{ org?.reservationDescription }}
      </p>
    }
    <div class="w-full max-w-xs">
      <app-button-landing
        label="Reservar ahora"
        variant="solid"
        (clicked)="navigate()"
      ></app-button-landing>
    </div>
  </div>
</section>
