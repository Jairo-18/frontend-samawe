<section class="w-full py-16 px-6 md:px-16 bg-[var(--bg-primary-color)]">
  <div
    class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10 items-center"
  >
    <!-- Text -->
    <div class="flex flex-col gap-4">
      <app-section-header
        variant="left"
        label="Lo que ofrecemos"
        [title]="org?.experienceTitle ?? ''"
        [description]="org?.experienceDescription"
      />

      <div>
        <app-button-landing
          label="Conocer más"
          variant="solid"
          (clicked)="navigate()"
        ></app-button-landing>
      </div>
    </div>
    <!-- Image -->
    <div
      class="w-full h-64 md:h-80 rounded-[4px] overflow-hidden shadow-lg border-[1px] border-[var(--primary-color)]"
    >
      <img
        [src]="imageUrl"
        alt="Experiencias Samawé"
        class="w-full h-full object-cover"
      />
    </div>
  </div>
</section>
