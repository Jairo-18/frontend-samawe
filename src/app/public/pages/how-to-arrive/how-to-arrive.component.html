<section class="w-full min-h-screen bg-[var(--bg-secondary-color)]">
  @if (!org) {
    <div class="flex justify-center py-20">
      <app-loader />
    </div>
  }

  @if (org) {
    <!-- Hero con HOW_TO_ARRIVE_IMAGE -->
    <div class="relative w-full h-[60vh] overflow-hidden">
      <img
        [src]="getMedia('HOW_TO_ARRIVE_IMAGE')"
        [alt]="'public.how_to_arrive.image_alt' | translate"
        class="absolute inset-0 w-full h-full object-cover z-0"
      />
      <div class="absolute inset-0 bg-black/40 z-0"></div>
      <div
        class="relative z-10 flex flex-col items-center justify-center h-full text-center text-white px-6"
      >
        <p
          class="text-sm font-semibold uppercase tracking-widest opacity-80 mb-2"
        >
          {{ 'public.how_to_arrive.location_label' | translate }}
        </p>
        <h1
          class="text-2xl md:text-5xl font-bold drop-shadow-md max-w-3xl leading-tight"
        >
          {{ 'public.how_to_arrive.title' | translate }}
        </h1>
        @if (org.howToArriveDescription) {
          <p
            class="mt-4 text-sm md:text-lg drop-shadow-md max-w-2xl opacity-90"
          >
            {{ org.howToArriveDescription }}
          </p>
        }
      </div>
    </div>

    <app-how-to-arrive-section [org]="org" />

    <app-reservation-section
      [org]="org"
      class="!bg-[var(--bg-secondary-color)]"
    />
  }
</section>
