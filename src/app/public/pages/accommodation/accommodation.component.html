<section class="w-full min-h-screen bg-stone-50">
  <!-- Header -->
  <div
    class="w-full bg-white border-b border-stone-200 py-10 px-6 md:px-16 text-center"
  >
    <app-section-header
      label="Hospedajes"
      [title]="org?.accommodationsTitle ?? ''"
      [description]="org?.accommodationsDescription"
    />
  </div>

  <!-- Content -->
  <div class="max-w-[1800px] mx-auto px-6 md:px-10 py-10">
    <!-- Loader -->
    @if (loading) {
      <div class="flex justify-center py-20">
        <app-loader />
      </div>
    }

    <!-- Empty state -->
    @if (!loading && accommodations.length === 0) {
      <div
        class="flex flex-col items-center justify-center py-24 gap-3 text-gray-400"
      >
        <span class="material-icons text-5xl">cabin</span>
        <p class="text-base">No hay hospedajes disponibles en este momento.</p>
      </div>
    }

    <!-- Grid -->
    @if (!loading && accommodations.length > 0) {
      <div
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 3xl:grid-cols-3 gap-6 xl:gap-10 3xl:gap-6"
      >
        @for (acc of accommodations; track acc.accommodationId) {
          <app-card-accommodation [accommodation]="acc" />
        }
      </div>

      <!-- Paginator -->
      @if (pagination.total > pagination.perPage) {
        <div class="flex justify-center mt-10">
          <mat-paginator
            [length]="pagination.total"
            [pageSize]="pagination.perPage"
            [pageIndex]="pagination.page - 1"
            [pageSizeOptions]="[10, 20, 40]"
            (page)="onPageChange($event)"
            showFirstLastButtons
          />
        </div>
      }
    }
  </div>
</section>
