@if (variant === 'centered') {
  <div class="flex flex-col items-center text-center gap-2">
    <span
      class="text-xs uppercase tracking-widest text-[var(--subtitle-color)] font-[900]"
    >
      {{ label }}
    </span>
    <h2
      class="text-2xl md:text-4xl font-bold text-[var(--title-color)] tracking-tight"
    >
      {{ title }}
    </h2>
    @if (description) {
      <p
        class="text-sm text-[var(--text-color)] max-w-xl mx-auto font-semibold"
      >
        {{ description }}
      </p>
    }
  </div>
}

@if (variant === 'left') {
  <div class="flex flex-col gap-1">
    <span
      class="text-xs uppercase tracking-widest text-[var(--subtitle-color)] font-[900]"
    >
      {{ label }}
    </span>
    <h2
      class="text-2xl md:text-3xl font-bold text-[var(--title-color)] leading-snug"
    >
      {{ title }}
    </h2>
    @if (description) {
      <p
        class="text-sm text-[var(--text-color)] max-w-xl mx-auto font-semibold"
      >
        {{ description }}
      </p>
    }
  </div>
}
