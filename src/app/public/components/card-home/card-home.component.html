<div
  class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3 gap-2 md:gap-4"
>
  @for (card of cards; track card.title) {
    <a
      [routerLink]="card.route || '/home'"
      [queryParams]="card.queryParams"
      class="flex p-2 md:p-4 rounded-2xl border border-[var(--primary-color)] shadow-md hover:shadow-xl transition-transform hover:scale-105 items-center no-underline text-inherit"
    >
      <div class="flex items-center w-full gap-x-2">
        <div class="flex items-center w-[10%]">
          <mat-icon class="text-[var(--primary-color)]">{{ card.icon }}</mat-icon>
        </div>
        <div class="flex flex-col w-[80%]">
          <span class="text-sm md:text-lg font-semibold">{{ card.title }}</span>
          <span class="text-xs md:text-sm text-gray-600">{{
            card.description
          }}</span>
        </div>
        <div class="flex items-center w-[10%]">
          <mat-icon class="text-black">{{ card.iconNext }}</mat-icon>
        </div>
      </div>
    </a>
  }
</div>
