server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers (applied via map to avoid duplication) ──────────────
    # NOTE: nginx does NOT inherit add_header from parent blocks when a child
    # location defines its own add_header. All security headers are therefore
    # repeated in every location that uses add_header.
    # 'unsafe-inline' in script-src is required by Google Maps JS API (inline event handlers).
    # Cloudflare Insights is injected server-side by the hosting platform and cannot be removed.
    set $security_csp "default-src 'self'; script-src 'self' 'unsafe-inline' https://maps.googleapis.com https://maps.gstatic.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleapis.com https://*.gstatic.com https://ecohotelsamawe.com https://api.ecohotelsamawe.com https://apidev.ecohotelsamawe.com; connect-src 'self' https://apidev.ecohotelsamawe.com https://api.ecohotelsamawe.com wss://api.ecohotelsamawe.com https://maps.googleapis.com https://cloudflareinsights.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self';";

    # Never cache index.html so browsers always get the latest chunk references
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy $security_csp always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        expires 0;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy $security_csp always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        expires 0;
    }

    # Cache hashed static assets for 1 year (safe because filenames change on each build)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
    }

    # Ensure robots.txt and sitemap.xml are served directly
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    location = /sitemap.xml {
        access_log off;
        log_not_found off;
        add_header Content-Type "application/xml" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
