server {
    listen 80;
    server_name localhost;

    # ── Security headers ──────────────────────────────────────────────────
    # 'unsafe-inline' in script-src is required by Google Maps JS API.
    set $security_csp "default-src 'self'; script-src 'self' 'unsafe-inline' https://maps.googleapis.com https://maps.gstatic.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleapis.com https://*.gstatic.com https://ecohotelsamawe.com https://api.ecohotelsamawe.com https://apidev.ecohotelsamawe.com; connect-src 'self' https://apidev.ecohotelsamawe.com wss://apidev.ecohotelsamawe.com https://api.ecohotelsamawe.com wss://api.ecohotelsamawe.com https://maps.googleapis.com https://cloudflareinsights.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self';";

    # ── Reverse proxy to Node.js SSR server ───────────────────────────────
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy $security_csp always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        more_clear_headers 'X-Powered-By';
    }

    # Ensure robots.txt and sitemap.xml are served directly
    location = /robots.txt {
        proxy_pass http://frontend:80;
        access_log off;
        log_not_found off;
    }

    location = /sitemap.xml {
        proxy_pass http://frontend:80;
        access_log off;
        log_not_found off;
        add_header Content-Type "application/xml" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, max-age=86400, must-revalidate" always;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
